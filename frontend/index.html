<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Selbstgehostetes Aktien Dashboard – Watchlist, technische Indikatoren und KI-gestützte Analyse.">
  <meta name="theme-color" content="#0a0e1a">
  <title>Aktien Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== LOGIN SCREEN ==================== -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg-orb login-bg-orb--1"></div>
    <div class="login-bg-orb login-bg-orb--2"></div>
    <div class="login-bg-orb login-bg-orb--3"></div>

    <div class="login-card" id="login-card">
      <div class="login-logo">
        <span class="login-logo-icon">📈</span>
        <h1 class="login-title">Aktien Dashboard</h1>
        <p class="login-subtitle">Bitte melde dich an, um fortzufahren</p>
      </div>

      <form id="login-form" class="login-form" autocomplete="off">
        <div class="input-group" id="input-group-password">
          <label for="password-input" class="input-label">Passwort</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password-input" class="input-field" placeholder="Passwort eingeben" required>
          </div>
        </div>

        <button type="submit" id="login-btn" class="btn btn-login">
          <span class="btn-text">Anmelden</span>
          <span class="btn-loader hidden" id="login-loader">
            <span class="spinner"></span>
          </span>
        </button>

        <div id="login-error" class="login-error hidden" role="alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="error-icon">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span id="login-error-text"></span>
        </div>
      </form>
    </div>
  </div>

  <!-- ==================== DASHBOARD ==================== -->
  <div id="dashboard" class="dashboard hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <span class="sidebar-logo">📈</span>
          <h1 class="sidebar-title">Dashboard</h1>
        </div>
        <button id="logout-btn" class="btn-icon" title="Abmelden" aria-label="Abmelden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <!-- Search -->
      <div class="search-container" id="search-container">
        <div class="search-input-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Aktie suchen…" autocomplete="off">
          <span id="search-clear" class="search-clear hidden" title="Suche leeren">&times;</span>
        </div>
        <div id="search-results" class="search-results hidden"></div>
      </div>

      <!-- Watchlist -->
      <div class="watchlist-section">
        <div class="watchlist-header">
          <h2 class="watchlist-title">Watchlist</h2>
          <span id="watchlist-count" class="watchlist-count">0</span>
        </div>
        <div id="watchlist" class="watchlist">
          <!-- Dynamically populated -->
        </div>
        <div id="watchlist-empty" class="watchlist-empty">
          <span class="watchlist-empty-icon">🔍</span>
          <p>Suche nach Aktien, um sie zur Watchlist hinzuzufügen.</p>
        </div>
      </div>
    </aside>

    <!-- Mobile sidebar toggle -->
    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Sidebar öffnen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <div class="empty-state-inner">
          <div class="empty-icon">📊</div>
          <h2 class="empty-title">Wähle eine Aktie aus der Watchlist</h2>
          <p class="empty-subtitle">Oder suche nach einer neuen Aktie, um loszulegen.</p>
        </div>
      </div>

      <!-- Stock detail view -->
      <div id="stock-detail" class="stock-detail hidden">

        <!-- Stock Header -->
        <header class="stock-header" id="stock-header">
          <div class="stock-title">
            <h2 id="stock-name" class="stock-name"></h2>
            <span id="stock-ticker" class="ticker-badge"></span>
          </div>
          <div class="stock-price-container">
            <span id="stock-price" class="stock-price"></span>
            <span id="stock-change" class="stock-change"></span>
          </div>
        </header>

        <!-- Sparkline Chart -->
        <section class="chart-section" id="chart-section">
          <div class="chart-header">
            <h3 class="section-title">Kursverlauf</h3>
            <div class="chart-period-btns" id="chart-period-btns">
              <button class="period-btn active" data-period="1mo">1M</button>
              <button class="period-btn" data-period="3mo">3M</button>
              <button class="period-btn" data-period="6mo">6M</button>
              <button class="period-btn" data-period="1y">1J</button>
            </div>
          </div>
          <div class="chart-container" id="chart-container">
            <canvas id="sparkline-chart"></canvas>
            <div id="chart-tooltip" class="chart-tooltip hidden"></div>
          </div>
        </section>

        <!-- Key Metrics Grid -->
        <section class="section" id="metrics-section">
          <h3 class="section-title">Kennzahlen</h3>
          <div class="metrics-grid" id="metrics-grid">
            <!-- Dynamically populated metric cards -->
          </div>
        </section>

        <!-- Technical Indicators -->
        <section class="section" id="indicators-section">
          <h3 class="section-title">Technische Indikatoren</h3>
          <div class="indicators-grid" id="indicators-grid">
            <!-- RSI, SMA, EMA cards -->
          </div>
        </section>

        <!-- LLM Analysis -->
        <section class="section" id="analysis-section">
          <div class="section-header">
            <h3 class="section-title">🤖 KI-Analyse</h3>
            <button id="analyze-btn" class="btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon-svg">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
              Analyse starten
            </button>
          </div>
          <div id="analysis-result" class="analysis-result hidden">
            <!-- LLM recommendation display -->
          </div>
          <div id="analysis-loading" class="analysis-loading hidden">
            <div class="skeleton skeleton-line skeleton-line--wide"></div>
            <div class="skeleton skeleton-line skeleton-line--medium"></div>
            <div class="skeleton skeleton-line skeleton-line--wide"></div>
            <div class="skeleton skeleton-line skeleton-line--short"></div>
            <div class="skeleton skeleton-line skeleton-line--medium"></div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- Sidebar overlay for mobile -->
  <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
